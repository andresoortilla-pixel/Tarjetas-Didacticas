<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tarjetas Vivas Multisensoriales</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; }

      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); z-index: 9999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
      }

      #start-btn {
        padding: 16px 40px; font-size: 18px;
        background: #28a745; color: white;
        border: none; border-radius: 12px;
        cursor: pointer;
      }

      #status {
        position: fixed; top: 10px; left: 10px; right: 10px;
        z-index: 9998; background: rgba(0,0,0,0.7); color: white;
        font-size: 14px; padding: 12px; border-radius: 8px;
        font-family: sans-serif; text-align: center; pointer-events: none;
      }

      /* Contenedor de videos a pantalla completa (fuera del espacio 3D AR).
         object-fit: cover llena TODA la pantalla del celular sin franjas,
         recortando lo que sobre a los lados o arriba/abajo si el aspecto
         del video no calza exacto con el de la pantalla. */
      #video-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        z-index: 9000;
        pointer-events: none;
        background: transparent; /* deja ver la cámara mientras no hay video activo */
      }

      #video-overlay video {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }

      #video-overlay video.activo {
        display: block;
      }
    </style>
  </head>

  <body>

    <div id="overlay">
      <button id="start-btn">📷 Dar permisos y Comenzar</button>
    </div>

    <div id="status">⏳ Cargando cámara...</div>

    <!-- Videos a pantalla completa: se muestran encima de todo al detectar la tarjeta -->
    <div id="video-overlay">
      <video id="video-a" src="./assets/Letra_A.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-b" src="./assets/Letra_B.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-c" src="./assets/Letra_C.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-d" src="./assets/Letra_D.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-e" src="./assets/Letra_E.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-f" src="./assets/Letra_F.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-g" src="./assets/Letra_G.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-h" src="./assets/Letra_H.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-i" src="./assets/Letra_I.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-j" src="./assets/Letra_J.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-k" src="./assets/Letra_K.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-l" src="./assets/Letra_L.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-m" src="./assets/Letra_M.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-n" src="./assets/Letra_N.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-o" src="./assets/Letra_O.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-p" src="./assets/Letra_P.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-q" src="./assets/Letra_Q.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-r" src="./assets/Letra_R.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-s" src="./assets/Letra_S.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-t" src="./assets/Letra_T.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-u" src="./assets/Letra_U.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-v" src="./assets/Letra_V.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-w" src="./assets/Letra_W.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-x" src="./assets/Letra_X.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-y" src="./assets/Letra_Y.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      <video id="video-z" src="./assets/Letra_Z.mp4" preload="auto" loop playsinline webkit-playsinline></video>
    </div>

    <!-- Se actualizó el nombre a targets.mind -->
    <a-scene
      mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; filterMinCF:0.0001; filterBeta: 0.001;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Estas entidades SOLO sirven para detectar (targetFound/targetLost). -->
      <a-entity mindar-image-target="targetIndex: 0" id="target-a"></a-entity>
      <a-entity mindar-image-target="targetIndex: 1" id="target-b"></a-entity>
      <a-entity mindar-image-target="targetIndex: 2" id="target-c"></a-entity>
      <a-entity mindar-image-target="targetIndex: 3" id="target-d"></a-entity>
      <a-entity mindar-image-target="targetIndex: 4" id="target-e"></a-entity>
      <a-entity mindar-image-target="targetIndex: 5" id="target-f"></a-entity>
      <a-entity mindar-image-target="targetIndex: 6" id="target-g"></a-entity>
      <a-entity mindar-image-target="targetIndex: 7" id="target-h"></a-entity>
      <a-entity mindar-image-target="targetIndex: 8" id="target-i"></a-entity>
      <a-entity mindar-image-target="targetIndex: 9" id="target-j"></a-entity>
      <a-entity mindar-image-target="targetIndex: 10" id="target-k"></a-entity>
      <a-entity mindar-image-target="targetIndex: 11" id="target-l"></a-entity>
      <a-entity mindar-image-target="targetIndex: 12" id="target-m"></a-entity>
      <a-entity mindar-image-target="targetIndex: 13" id="target-n"></a-entity>
      <a-entity mindar-image-target="targetIndex: 14" id="target-o"></a-entity>
      <a-entity mindar-image-target="targetIndex: 15" id="target-p"></a-entity>
      <a-entity mindar-image-target="targetIndex: 16" id="target-q"></a-entity>
      <a-entity mindar-image-target="targetIndex: 17" id="target-r"></a-entity>
      <a-entity mindar-image-target="targetIndex: 18" id="target-s"></a-entity>
      <a-entity mindar-image-target="targetIndex: 19" id="target-t"></a-entity>
      <a-entity mindar-image-target="targetIndex: 20" id="target-u"></a-entity>
      <a-entity mindar-image-target="targetIndex: 21" id="target-v"></a-entity>
      <a-entity mindar-image-target="targetIndex: 22" id="target-w"></a-entity>
      <a-entity mindar-image-target="targetIndex: 23" id="target-x"></a-entity>
      <a-entity mindar-image-target="targetIndex: 24" id="target-y"></a-entity>
      <a-entity mindar-image-target="targetIndex: 25" id="target-z"></a-entity>

    </a-scene>

    <script>
      const overlayEl = document.getElementById("overlay");
      const startBtn  = document.getElementById("start-btn");
      const statusEl  = document.getElementById("status");

      const tarjetas = [
        { id: "target-a", videoId: "video-a", nombre: "Abeja (A)" },
        { id: "target-b", videoId: "video-b", nombre: "Ballena (B)" },
        { id: "target-c", videoId: "video-c", nombre: "Casa (C)" },
        { id: "target-d", videoId: "video-d", nombre: "Dado (D)" },
        { id: "target-e", videoId: "video-e", nombre: "Estrella (E)" },
        { id: "target-f", videoId: "video-f", nombre: "Foca (F)" },
        { id: "target-g", videoId: "video-g", nombre: "Gato (G)" },
        { id: "target-h", videoId: "video-h", nombre: "Helado (H)" },
        { id: "target-i", videoId: "video-i", nombre: "Imán (I)" },
        { id: "target-j", videoId: "video-j", nombre: "Jirafa (J)" },
        { id: "target-k", videoId: "video-k", nombre: "Koala (K)" },
        { id: "target-l", videoId: "video-l", nombre: "León (L)" },
        { id: "target-m", videoId: "video-m", nombre: "Mono (M)" },
        { id: "target-n", videoId: "video-n", nombre: "Nube (N)" },
        { id: "target-o", videoId: "video-o", nombre: "Oso (O)" },
        { id: "target-p", videoId: "video-p", nombre: "Pato (P)" },
        { id: "target-q", videoId: "video-q", nombre: "Queso (Q)" },
        { id: "target-r", videoId: "video-r", nombre: "Rana (R)" },
        { id: "target-s", videoId: "video-s", nombre: "Sol (S)" },
        { id: "target-t", videoId: "video-t", nombre: "Tren (T)" },
        { id: "target-u", videoId: "video-u", nombre: "Uva (U)" },
        { id: "target-v", videoId: "video-v", nombre: "Vaca (V)" },
        { id: "target-w", videoId: "video-w", nombre: "Waffle (W)" },
        { id: "target-x", videoId: "video-x", nombre: "Xilófono (X)" },
        { id: "target-y", videoId: "video-y", nombre: "Yoyo (Y)" },
        { id: "target-z", videoId: "video-z", nombre: "Zorro (Z)" }
      ];

      let elementosInteractivos = [];

      function ocultarTodosLosVideos() {
        elementosInteractivos.forEach(item => {
          item.videoEl.classList.remove("activo");
          item.videoEl.pause();
          item.videoEl.currentTime = 0;
        });
      }

      startBtn.addEventListener("click", function () {
        overlayEl.style.display = "none";
        statusEl.innerText = "📷 Apunta la cámara a cualquier tarjeta...";

        elementosInteractivos = tarjetas.map(t => {
          const targetEl = document.getElementById(t.id);
          const videoEl = document.getElementById(t.videoId);

          // Precarga silenciosa
          if (videoEl) {
             videoEl.play().then(() => videoEl.pause()).catch(e => console.log("Error preload:", e));
          }

          return { targetEl, videoEl, nombre: t.nombre };
        });

        elementosInteractivos.forEach(item => {
          if (item.targetEl && item.videoEl) {
            item.targetEl.addEventListener("targetFound", function () {
              statusEl.style.background = "rgba(0,140,0,0.88)";
              statusEl.innerText = `🟢 ¡Detectado: ${item.nombre}! Reproduciendo...`;

              // Oculta cualquier otro video que pudiera haber quedado activo
              ocultarTodosLosVideos();

              item.videoEl.classList.add("activo");
              item.videoEl.currentTime = 0;
              item.videoEl.play();
            });

            item.targetEl.addEventListener("targetLost", function () {
              statusEl.style.background = "rgba(0,0,0,0.7)";
              statusEl.innerText = "📷 Apunta la cámara a cualquier tarjeta...";
              item.videoEl.classList.remove("activo");
              item.videoEl.pause();
              item.videoEl.currentTime = 0;
            });
          }
        });
      });
    </script>
  </body>
</html>
